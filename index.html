<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能皮肤皮损辅助筛查系统</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<style>
:root{--bg-s:#F5F0EB;--bg-e:#D6E4F0;--surface:rgba(255,255,255,0.55);--text:#1E2D3D;--text2:#5A6B7A;--accent:#3B8EBD;--accent-g1:#5BACE0;--accent-g2:#3DD6C8;--success:#3CAD7A;--warn:#E89B3C;--danger:#D4736A}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans SC",Inter,sans-serif;background:linear-gradient(135deg,var(--bg-s),var(--bg-e));background-attachment:fixed;color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;line-height:1.6}
.app{width:100%;max-width:1100px;background:var(--surface);backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);border:1px solid rgba(255,255,255,0.4);border-radius:24px;padding:40px;box-shadow:0 16px 40px rgba(30,45,61,0.10)}
.hd{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid rgba(255,255,255,0.4);padding-bottom:24px;margin-bottom:28px}
.hd h1{font-size:26px;font-weight:700;color:#1a365d;margin-bottom:6px}
.hd p{font-size:14px;color:var(--text2)}
.sel{background:rgba(255,255,255,0.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(59,142,189,0.25);padding:8px 16px;border-radius:12px;font-size:14px;font-family:inherit;color:var(--text);cursor:pointer;outline:none}
.ws{display:flex;gap:32px}.pl,.pr{flex:1;display:flex;flex-direction:column}
.pt{font-size:16px;font-weight:600;margin-bottom:16px;color:#2c5282;display:flex;align-items:center;gap:8px}
.uc{background:rgba(255,255,255,0.5);border:2px dashed rgba(100,160,200,0.45);border-radius:20px;padding:36px 20px;text-align:center;cursor:pointer;transition:all 0.3s}
.uc:hover{background:rgba(255,255,255,0.75);border-color:var(--accent);transform:translateY(-2px)}
.uc.go{background:rgba(255,255,255,0.9);border-color:var(--accent);border-style:solid;transform:scale(1.015)}
.ic{font-size:40px;margin-bottom:14px;display:inline-block}.uc p{font-size:14px;color:var(--text2)}
#fi{display:none}
.pv{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:12px;margin-top:18px;max-height:180px;overflow-y:auto}
.pi{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;border:2px solid rgba(255,255,255,0.75);box-shadow:0 1px 3px rgba(30,45,61,0.04);transition:all 0.3s}
.pi:hover{transform:scale(1.05)}.pi img{width:100%;height:100%;object-fit:cover}
.pi:hover .db{opacity:1}
.db{position:absolute;top:4px;right:4px;background:rgba(212,115,106,0.9);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:14px;cursor:pointer;opacity:0;transition:all 0.2s;display:flex;align-items:center;justify-content:center;z-index:10}
.db:hover{background:var(--danger);transform:scale(1.15)}
.btn{background:linear-gradient(135deg,var(--accent-g1),var(--accent-g2));color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:600;cursor:pointer;margin-top:auto;box-shadow:0 6px 20px rgba(59,142,189,0.3);transition:all 0.25s}
.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 28px rgba(59,142,189,0.4)}
.btn:disabled{background:#CBD5E0;box-shadow:none;cursor:not-allowed}
.rw{background:rgba(255,255,255,0.3);border-radius:20px;border:1px solid rgba(255,255,255,0.3);padding:20px;min-height:320px;max-height:480px;overflow-y:auto}
.em{text-align:center;color:var(--text2);padding:60px 20px;font-size:14px}
.em .ei{font-size:42px;margin-bottom:14px;display:block;opacity:0.6}
.rc{background:rgba(255,255,255,0.65);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.5);border-radius:14px;padding:20px;margin-bottom:16px;animation:ci 0.4s ease backwards}
@keyframes ci{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.rh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sn{font-size:14px;font-weight:600}
.bd{padding:5px 14px;border-radius:8px;font-size:12px;font-weight:700;white-space:nowrap}
.bc{background:#E8F0F8;color:#5A7A9A;animation:sh 1.5s infinite}
@keyframes sh{0%,100%{opacity:1}50%{opacity:0.5}}
.pb{background:rgba(30,45,61,0.06);height:6px;border-radius:3px;overflow:hidden;margin-bottom:12px}
.pf{height:100%;border-radius:3px;transition:width 1.2s,background 0.6s}
.pf.pu{animation:pu 1.5s infinite;background:#CBD5E0!important}
@keyframes pu{0%,100%{opacity:0.5}50%{opacity:0.9}}
.ml{font-size:14px;margin-bottom:8px}
.at{font-size:13px;line-height:1.7;padding-top:8px;border-top:1px dashed rgba(0,0,0,0.06);color:var(--text2)}
.ds{margin-top:16px;padding:14px 16px;background:rgba(255,255,255,0.45);border-radius:12px;border:1px solid rgba(0,0,0,0.05)}
.dw{display:block;font-size:13px;font-weight:600;color:#D4736A;margin-bottom:8px;line-height:1.6}
.dc{display:block;font-size:11px;color:var(--text2);line-height:1.5;opacity:0.8}
.ov{position:fixed;inset:0;background:rgba(245,240,235,0.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:1000}
.ov.on{display:flex}
.sp{width:48px;height:48px;border:3px solid #ddd;border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.dbg{position:fixed;top:0;left:0;right:0;background:#1a1a2e;color:#0f0;font-size:11px;font-family:monospace;padding:4px 12px;z-index:9999;display:flex;justify-content:space-between;max-height:80px;overflow-y:auto}.dbg .er{color:#f44}
@media(max-width:768px){.app{padding:24px}.ws{flex-direction:column;gap:24px}.btn{width:100%;padding:18px}.hd h1{font-size:20px}}
@media(prefers-reduced-motion:reduce){*,*::after,*::before{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
</style>
</head>
<body>

<div class="dbg"><span id="dbs">&#9679;</span><span id="dbi"></span></div>
<div class="ov" id="ov"><div class="sp"></div><p style="margin-top:20px;font-size:14px;color:var(--text2)" id="om"></p><p style="margin-top:8px;font-size:12px;color:var(--text3)" id="op"></p></div>

<div class="app">

<div class="pr">

</div>
</div>

async function pred(file){var m=await loadModel();L('Proc:'+file.name);

window.go=async function(){L('=== GO ===');if(AN)return;if(!F.length){alert(X('e'));return}AN=true;

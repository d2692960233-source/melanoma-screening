name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }

      - name: Install Android SDK
        run: |
          # Download cmdline-tools
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/sdk.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q /tmp/sdk.zip -d /tmp/sdk-tmp
          mv /tmp/sdk-tmp/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          # Set env
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          # Accept licenses and install packages
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"

      - name: Build Capacitor APK
        run: |
          # Create project
          mkdir app_build && cd app_build
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # Config
          echo '{"appId":"com.skincheck.ai","appName":"SkinCheck AI","webDir":"www"}' > capacitor.config.json
          # Copy web files
          mkdir www
          cp ../index.html www/
          cp ../worker.js www/
          cp ../manifest.json www/ 2>/dev/null || true
          cp ../sw.js www/ 2>/dev/null || true
          cp -r ../tfjs_model www/
          cp ../icon-192.png www/ 2>/dev/null || true
          cp ../icon-512.png www/ 2>/dev/null || true
          # Add Android
          npx cap add android
          # Set SDK path
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          # Build
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: SkinCheck-AI-APK
          path: app_build/android/app/build/outputs/apk/debug/app-debug.apk

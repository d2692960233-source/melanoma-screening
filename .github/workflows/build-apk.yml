name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }

      - name: Setup Android SDK
        run: |
          curl -sL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o /tmp/sdk.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q /tmp/sdk.zip -d /tmp/sdk-tmp
          mv /tmp/sdk-tmp/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "build-tools;34.0.0" "platforms;android-34"

      - name: Create Android Project
        run: |
          # Directories
          mkdir -p app/src/main/java/com/skincheck/ai
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets

          # Copy website
          cp index.html app/src/main/assets/
          cp worker.js app/src/main/assets/
          cp manifest.json app/src/main/assets/ 2>/dev/null || true
          cp sw.js app/src/main/assets/ 2>/dev/null || true
          cp -r tfjs_model app/src/main/assets/

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application android:allowBackup="true" android:label="SkinCheck AI"
                  android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                  <activity android:name=".MainActivity" android:exported="true"
                      android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          # MainActivity.java
          cat > app/src/main/java/com/skincheck/ai/MainActivity.java << 'EOF'
          package com.skincheck.ai;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.WebChromeClient;
          public class MainActivity extends Activity {
              @Override protected void onCreate(Bundle b) {
                  super.onCreate(b);
                  WebView wv = new WebView(this);
                  WebSettings ws = wv.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setAllowFileAccess(true);
                  ws.setAllowFileAccessFromFileURLs(true);
                  ws.setAllowUniversalAccessFromFileURLs(true);
                  ws.setDomStorageEnabled(true);
                  ws.setDatabaseEnabled(true);
                  wv.setWebViewClient(new WebViewClient());
                  wv.setWebChromeClient(new WebChromeClient());
                  wv.loadUrl("file:///android_asset/index.html");
                  setContentView(wv);
              }
          }
          EOF

          # Root build.gradle
          cat > build.gradle << 'EOF'
          plugins { id 'com.android.application' version '8.2.0' apply false }
          EOF

          # App build.gradle
          cat > app/build.gradle << 'EOF'
          plugins { id 'com.android.application' }
          android {
              namespace 'com.skincheck.ai'
              compileSdk 34
              defaultConfig {
                  applicationId "com.skincheck.ai"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes { release { minifyEnabled false } }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }
          EOF

          # settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositories { google(); mavenCentral() } }
          rootProject.name = 'SkinCheckAI'
          EOF

          # gradle.properties
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          # local.properties
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Install Gradle
        run: |
          curl -sL https://services.gradle.org/distributions/gradle-8.5-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Build APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: SkinCheck-AI-APK
          path: app/build/outputs/apk/debug/app-debug.apk

name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Create Capacitor project
        run: |
          mkdir -p app_build
          cd app_build
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Configure Capacitor
        run: |
          cd app_build
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.skincheck.ai",
            "appName": "SkinCheck AI",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF

      - name: Copy web files
        run: |
          cd app_build
          mkdir -p www
          cp ../index.html www/
          cp ../worker.js www/
          cp ../test.html www/ 2>/dev/null || true
          cp ../manifest.json www/ 2>/dev/null || true
          cp ../sw.js www/ 2>/dev/null || true
          cp -r ../tfjs_model www/ 2>/dev/null || true
          cp ../icon-192.png www/ 2>/dev/null || true
          cp ../icon-512.png www/ 2>/dev/null || true

      - name: Add Android platform
        run: |
          cd app_build
          npx cap add android

      - name: Build APK
        run: |
          cd app_build/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SkinCheck-AI-APK
          path: app_build/android/app/build/outputs/apk/debug/app-debug.apk
